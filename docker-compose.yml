services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cps
      POSTGRES_USER: cps
      POSTGRES_PASSWORD: cps_dev_password
    shm_size: 256mb
    command: >
      postgres
      -c max_locks_per_transaction=256
      -c shared_buffers=128MB
      -c work_mem=16MB
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cps"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-test:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: cps_test
      POSTGRES_USER: cps_test
      POSTGRES_PASSWORD: cps_test_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cps_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
